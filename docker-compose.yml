services:
  mysql:
    image: mysql:8.0
    container_name: zola-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zola
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - zola_mysql_data:/var/lib/mysql
      - ./zola-api/database/scripts/create_zola_database.sql:/docker-entrypoint-initdb.d/01-create-zola.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: zola-api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./zola-api:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Zola
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: zola
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      bash -c "
        composer install --no-interaction &&
        php artisan key:generate --force --no-interaction 2>/dev/null || true &&
        php artisan migrate --force &&
        php artisan db:seed --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: zola-web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./zola-web:/app
      - zola_web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  zola_mysql_data:
  zola_web_node_modules:
