<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zola — Mes points</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root {
    --orange:#F56001; --ink:#0A0A0A; --slate:#5C5C5E; --mist:#F4F4F5;
    --white:#FFFFFF; --border:#E5E5E7; --alert:#D14343; --alert-bg:#FBEAEA;
    --success:#1E8E5A; --success-bg:#E8F5EE;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',-apple-system,sans-serif; background:var(--mist); color:var(--ink); font-feature-settings:"tnum" 1; padding-bottom:110px; }

  .topbar { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; max-width:1100px; margin:0 auto; }
  .topbar .title { font-size:24px; font-weight:800; }
  .topbar .sub { font-size:13px; color:var(--slate); margin-top:2px; }
  .avatar { width:40px; height:40px; border-radius:50%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }

  .container { max-width:1100px; margin:0 auto; padding:0 24px; display:flex; flex-direction:column; gap:20px; }

  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .kpi-card { background:var(--white); border-radius:18px; padding:18px; border:1px solid var(--border); }
  .kpi-card .lbl { font-size:12px; color:var(--slate); font-weight:600; margin-bottom:8px; }
  .kpi-card .val { font-size:26px; font-weight:800; }
  .kpi-card .val.alert-val { color:var(--alert); }

  .card { background:var(--white); border-radius:20px; padding:22px; border:1px solid var(--border); }
  .card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .card-head h3 { font-size:15px; font-weight:700; }
  .add-btn { background:var(--orange); color:#fff; font-size:13px; font-weight:700; padding:10px 16px; border-radius:12px; border:none; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }

  .point-row { display:flex; align-items:center; justify-content:space-between; padding:14px 6px; border-bottom:1px solid #F0F0F1; text-decoration:none; color:inherit; }
  .point-row:last-child { border-bottom:none; }
  .point-row:hover { background:var(--mist); border-radius:12px; }
  .pr-left { display:flex; align-items:center; gap:14px; }
  .pr-icon { width:42px; height:42px; border-radius:12px; background:var(--mist); display:flex; align-items:center; justify-content:center; font-size:18px; }
  .pr-name { font-size:14px; font-weight:700; }
  .pr-meta { font-size:12px; color:var(--slate); margin-top:2px; }
  .pr-right { display:flex; align-items:center; gap:12px; }
  .pill { font-size:11px; font-weight:700; padding:4px 10px; border-radius:100px; }
  .pill.ok { background:var(--success-bg); color:var(--success); }
  .pill.low { background:var(--alert-bg); color:var(--alert); }
  .chev { color:var(--slate); font-size:14px; }

  .dock {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; background:rgba(255,255,255,0.6);
    backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,0.7); border-radius:24px; padding:10px 12px;
    box-shadow:0 10px 34px rgba(0,0,0,0.18);
  }
  .dock a.dicon, .dock .dicon {
    width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center;
    font-size:18px; cursor:pointer; background:rgba(10,10,10,0.06); color:var(--ink); transition:transform .15s ease; text-decoration:none;
  }
  .dock .dicon.active { background:var(--orange); color:#fff; transform:translateY(-8px); box-shadow:0 8px 18px rgba(245,96,1,0.45); }

  @media (max-width:800px) { .kpi-grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>

<div class="topbar">
  <div><div class="title">Mes points</div><div class="sub">3 points actifs</div></div>
  <a class="avatar" href="15-profil.html" style="text-decoration:none;">IT</a>
</div>

<div class="container">

  <div class="kpi-grid">
    <div class="kpi-card"><div class="lbl">Points actifs</div><div class="val">3</div></div>
    <div class="kpi-card"><div class="lbl">Anomalies</div><div class="val alert-val">1</div></div>
    <div class="kpi-card"><div class="lbl">Volume semaine</div><div class="val">3,5M</div></div>
    <div class="kpi-card"><div class="lbl">Transactions</div><div class="val">240</div></div>
  </div>

  <div class="card">
    <div class="card-head">
      <h3>Détail par point</h3>
      <a class="add-btn" href="10-creation-point.html">+ Ajouter un point</a>
    </div>

    <a class="point-row" href="04-dashboard-owner-solo.html">
      <div class="pr-left">
        <div class="pr-icon">&#127970;</div>
        <div><div class="pr-name">Bonamoussadi</div><div class="pr-meta">Moi-même</div></div>
      </div>
      <div class="pr-right"><span class="pill ok">Float OK</span><span class="chev">&#8250;</span></div>
    </a>

    <a class="point-row" href="13-controle-caisse.html">
      <div class="pr-left">
        <div class="pr-icon">&#127970;</div>
        <div><div class="pr-name">Ndokoti</div><div class="pr-meta">Superviseur : Brice</div></div>
      </div>
      <div class="pr-right"><span class="pill low">Float bas</span><span class="chev">&#8250;</span></div>
    </a>

    <a class="point-row" href="13-controle-caisse.html">
      <div class="pr-left">
        <div class="pr-icon">&#127970;</div>
        <div><div class="pr-name">Akwa</div><div class="pr-meta">Superviseur : Sarah</div></div>
      </div>
      <div class="pr-right"><span class="pill ok">Float OK</span><span class="chev">&#8250;</span></div>
    </a>
  </div>

</div>

<div class="dock">
  <a class="dicon active" href="09-dashboard-owner-multi.html">&#8962;</a>
  <a class="dicon" href="11-equipe.html">&#128101;</a>
  <a class="dicon" href="12-rapports.html">&#128202;</a>
</div>

</body>
</html>
