<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zola — Réapprovisionnement</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root {
    --orange:#F56001; --orange-dim:#FFF1E6;
    --ink:#0A0A0A; --slate:#5C5C5E; --mist:#F4F4F5;
    --white:#FFFFFF; --border:#E5E5E7;
    --alert:#D14343; --alert-bg:#FBEAEA;
    --success:#1E8E5A; --success-bg:#E8F5EE;
    --info:#B8860B; --info-bg:#FFF9DB;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { min-height:100%; }
  body {
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--mist); color:var(--ink);
    font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }

  .topbar { display:flex; align-items:center; gap:14px; padding:20px 24px; max-width:560px; margin:0 auto; }
  .back-btn { width:38px; height:38px; border-radius:12px; background:var(--white); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; color:var(--ink); font-size:16px; }
  .topbar .title { font-size:18px; font-weight:800; }

  .container { max-width:560px; margin:0 auto; padding:0 24px; display:flex; flex-direction:column; gap:20px; }

  .section-label { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--slate); margin-bottom:10px; display:block; }

  .segmented { display:flex; background:var(--white); border:1.5px solid var(--border); border-radius:16px; padding:5px; gap:5px; }
  .segmented button {
    flex:1; padding:13px; border:none; background:transparent; border-radius:12px;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:700; color:var(--slate); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:background .15s ease, color .15s ease;
  }
  .segmented button.active { background:var(--ink); color:#fff; }

  .op-choice { display:none; gap:10px; }
  .op-choice.visible { display:flex; }
  .op-choice button {
    flex:1; padding:14px; border-radius:14px; border:1.5px solid var(--border); background:var(--white);
    font-family:'Inter',sans-serif; font-size:13px; font-weight:700; color:var(--ink); cursor:pointer;
  }
  .op-choice button.active.om { border-color:var(--orange); background:var(--orange-dim); color:var(--orange); }
  .op-choice button.active.momo { border-color:var(--info); background:var(--info-bg); color:var(--info); }

  .sens-choice { display:flex; gap:10px; }
  .sens-choice button {
    flex:1; padding:14px; border-radius:14px; border:1.5px solid var(--border); background:var(--white);
    font-family:'Inter',sans-serif; font-size:13px; font-weight:700; color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .sens-choice button.active.add { border-color:var(--success); background:var(--success-bg); color:var(--success); }
  .sens-choice button.active.remove { border-color:var(--alert); background:var(--alert-bg); color:var(--alert); }

  .field label { display:block; font-size:13px; font-weight:600; color:var(--ink); margin-bottom:8px; }
  input[type=text] {
    width:100%; padding:15px 16px; border-radius:14px; border:1.5px solid var(--border); background:var(--white);
    font-family:'Inter',sans-serif; font-size:15px; color:var(--ink);
  }
  input:focus { outline:none; border-color:var(--orange); box-shadow:0 0 0 4px var(--orange-dim); }
  .amount-input { position:relative; }
  .amount-input input { font-size:22px; font-weight:800; padding-right:70px; }
  .amount-input .suffix { position:absolute; right:16px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--slate); font-weight:600; }

  .preview-card { background:var(--white); border-radius:16px; padding:18px; border:1.5px solid var(--border); }
  .preview-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; font-size:13px; }
  .preview-row.total { border-top:1px dashed var(--border); margin-top:6px; padding-top:14px; font-weight:800; font-size:15px; }
  .preview-row .lbl { color:var(--slate); }
  .preview-row .val.up { color:var(--success); }
  .preview-row .val.down { color:var(--alert); }

  .btn { width:100%; padding:16px; border-radius:14px; border:none; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .btn.primary { background:var(--orange); color:#fff; }
  .btn.primary:disabled { background:#F5C299; cursor:not-allowed; }
  .btn.primary:not(:disabled):hover { opacity:0.92; }

  .success-overlay { position:fixed; inset:0; background:rgba(10,10,10,0.4); display:none; align-items:center; justify-content:center; z-index:60; padding:20px; }
  .success-overlay.show { display:flex; }
  .success-card { background:var(--white); border-radius:22px; padding:32px 26px; text-align:center; max-width:340px; width:100%; }
  .success-card .check { width:56px; height:56px; border-radius:50%; background:var(--success-bg); color:var(--success); font-size:26px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  .success-card h3 { font-size:17px; font-weight:800; margin-bottom:6px; }
  .success-card p { font-size:13px; color:var(--slate); margin-bottom:20px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="04-dashboard-owner-solo.html">&#8592;</a>
  <div class="title">Réapprovisionner</div>
</div>

<div class="container">

  <div>
    <span class="section-label">Type de mouvement</span>
    <div class="segmented">
      <button class="active" id="btnCash" data-mtype="cash">&#128181; Cash</button>
      <button data-mtype="electronic" id="btnElec">&#128241; Électronique</button>
    </div>
  </div>

  <div class="op-choice" id="opChoice">
    <button class="active om" data-op="om" id="btnOm">Orange Money</button>
    <button data-op="momo" id="btnMomo">MTN MoMo</button>
  </div>

  <div>
    <span class="section-label">Sens</span>
    <div class="sens-choice">
      <button class="active add" data-sens="add" id="btnAdd">&#8593; Ajout</button>
      <button data-sens="remove" id="btnRemove">&#8595; Retrait</button>
    </div>
  </div>

  <div class="field">
    <label for="amount">Montant</label>
    <div class="amount-input">
      <input type="text" id="amount" placeholder="0" inputmode="numeric">
      <span class="suffix">FCFA</span>
    </div>
  </div>

  <div class="field">
    <label for="comment">Commentaire</label>
    <input type="text" id="comment" placeholder="Ex: recharge chez distributeur Total Bonamoussadi">
  </div>

  <div class="preview-card">
    <div class="preview-row"><span class="lbl">Solde actuel</span><span class="val" id="currentBalance">96 800 FCFA</span></div>
    <div class="preview-row"><span class="lbl">Mouvement</span><span class="val" id="movementVal">+ 0 FCFA</span></div>
    <div class="preview-row total"><span class="lbl">Nouveau solde</span><span class="val" id="newBalance">96 800 FCFA</span></div>
  </div>

  <button class="btn primary" id="submitBtn" disabled>Enregistrer le mouvement</button>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="check">&#10003;</div>
    <h3>Mouvement enregistré</h3>
    <p id="successDetail">Cash — Ajout de 50 000 FCFA</p>
    <a class="btn primary" href="04-dashboard-owner-solo.html">Retour au tableau de bord</a>
  </div>
</div>

<script>
  const balances = { cash: 96800, om: 184200, momo: 31000 };

  const btnCash = document.getElementById('btnCash');
  const btnElec = document.getElementById('btnElec');
  const opChoice = document.getElementById('opChoice');
  const btnOm = document.getElementById('btnOm');
  const btnMomo = document.getElementById('btnMomo');
  const btnAdd = document.getElementById('btnAdd');
  const btnRemove = document.getElementById('btnRemove');
  const amount = document.getElementById('amount');
  const comment = document.getElementById('comment');
  const currentBalance = document.getElementById('currentBalance');
  const movementVal = document.getElementById('movementVal');
  const newBalance = document.getElementById('newBalance');
  const submitBtn = document.getElementById('submitBtn');

  let mtype = 'cash';
  let op = 'om';
  let sens = 'add';

  function fmt(n) { return new Intl.NumberFormat('fr-FR').format(n) + ' FCFA'; }

  function currentKey() { return mtype === 'cash' ? 'cash' : op; }

  function updatePreview() {
    const base = balances[currentKey()];
    const amt = parseInt(amount.value.replace(/\D/g,''),10) || 0;
    const delta = sens === 'add' ? amt : -amt;
    const result = base + delta;

    currentBalance.textContent = fmt(base);
    movementVal.textContent = (sens === 'add' ? '+ ' : '− ') + fmt(amt).replace('FCFA','').trim() + ' FCFA';
    movementVal.className = 'val ' + (sens === 'add' ? 'up' : 'down');
    newBalance.textContent = fmt(result);
    newBalance.style.color = result < 0 ? 'var(--alert)' : '';

    submitBtn.disabled = amt <= 0 || result < 0;
  }

  btnCash.addEventListener('click', () => {
    mtype = 'cash'; btnCash.classList.add('active'); btnElec.classList.remove('active');
    opChoice.classList.remove('visible');
    updatePreview();
  });
  btnElec.addEventListener('click', () => {
    mtype = 'electronic'; btnElec.classList.add('active'); btnCash.classList.remove('active');
    opChoice.classList.add('visible');
    updatePreview();
  });
  btnOm.addEventListener('click', () => { op='om'; btnOm.classList.add('active','om'); btnMomo.classList.remove('active','momo'); updatePreview(); });
  btnMomo.addEventListener('click', () => { op='momo'; btnMomo.classList.add('active','momo'); btnOm.classList.remove('active','om'); updatePreview(); });
  btnAdd.addEventListener('click', () => { sens='add'; btnAdd.classList.add('active','add'); btnRemove.classList.remove('active','remove'); updatePreview(); });
  btnRemove.addEventListener('click', () => { sens='remove'; btnRemove.classList.add('active','remove'); btnAdd.classList.remove('active','add'); updatePreview(); });

  amount.addEventListener('input', () => { amount.value = amount.value.replace(/[^0-9]/g,''); updatePreview(); });

  updatePreview();

  submitBtn.addEventListener('click', () => {
    if (submitBtn.disabled) return;
    const amt = parseInt(amount.value.replace(/\D/g,''),10) || 0;
    const typeLabel = mtype === 'cash' ? 'Cash' : (op === 'om' ? 'Orange Money' : 'MTN MoMo');
    const sensLabel = sens === 'add' ? 'Ajout' : 'Retrait';
    document.getElementById('successDetail').textContent = typeLabel + ' — ' + sensLabel + ' de ' + fmt(amt);
    document.getElementById('successOverlay').classList.add('show');
  });
</script>

</body>
</html>
