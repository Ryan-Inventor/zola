<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zola — Nouveau point</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root {
    --orange:#F56001; --orange-dim:#FFF1E6; --ink:#0A0A0A; --slate:#5C5C5E; --mist:#F4F4F5;
    --white:#FFFFFF; --border:#E5E5E7; --success:#1E8E5A;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',-apple-system,sans-serif; background:var(--mist); color:var(--ink); font-feature-settings:"tnum" 1; padding-bottom:60px; }
  .topbar { display:flex; align-items:center; gap:14px; padding:20px 24px; max-width:560px; margin:0 auto; }
  .back-btn { width:38px; height:38px; border-radius:12px; background:var(--white); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; color:var(--ink); font-size:16px; }
  .topbar .title { font-size:18px; font-weight:800; }
  .container { max-width:560px; margin:0 auto; padding:0 24px; display:flex; flex-direction:column; gap:20px; }

  .field label { display:block; font-size:13px; font-weight:600; margin-bottom:8px; }
  input[type=text] { width:100%; padding:15px 16px; border-radius:14px; border:1.5px solid var(--border); background:var(--white); font-family:'Inter',sans-serif; font-size:15px; }
  input:focus { outline:none; border-color:var(--orange); box-shadow:0 0 0 4px var(--orange-dim); }

  .section-label { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--slate); margin-bottom:10px; display:block; }
  .choice-row { display:flex; gap:10px; }
  .choice-card { flex:1; border:2px solid var(--border); border-radius:16px; padding:18px; text-align:center; cursor:pointer; background:var(--white); }
  .choice-card.selected { border-color:var(--orange); background:var(--orange-dim); }
  .choice-card .ic { font-size:22px; margin-bottom:6px; }
  .choice-card .lbl { font-size:12px; font-weight:700; }

  .supervisor-search { display:none; flex-direction:column; gap:10px; }
  .supervisor-search.visible { display:flex; }
  .search-results { background:var(--white); border:1.5px solid var(--border); border-radius:14px; overflow:hidden; }
  .search-item { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; cursor:pointer; border-bottom:1px solid #F0F0F1; }
  .search-item:last-child { border-bottom:none; }
  .search-item:hover { background:var(--mist); }
  .search-item.selected { background:var(--orange-dim); }
  .search-item .si-name { font-size:13px; font-weight:700; }
  .search-item .si-tag { font-size:11px; color:var(--slate); }
  .invite-note { font-size:12px; color:var(--slate); text-align:center; padding:10px; }
  .invite-note a { color:var(--orange); font-weight:700; text-decoration:none; }

  .card { background:var(--white); border-radius:18px; padding:20px; border:1.5px solid var(--border); }
  .card h4 { font-size:14px; font-weight:700; margin-bottom:14px; }
  .card .field { margin-bottom:14px; }
  .card .field:last-child { margin-bottom:0; }
  .hint-box { background:#FFF9DB; color:#8a6d00; font-size:12px; padding:10px 14px; border-radius:12px; margin-bottom:4px; }

  .btn { width:100%; padding:16px; border-radius:14px; border:none; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
  .btn.primary { background:var(--orange); color:#fff; }
  .btn.primary:disabled { background:#F5C299; cursor:not-allowed; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="09-dashboard-owner-multi.html">&#8592;</a>
  <div class="title">Nouveau point</div>
</div>

<div class="container">

  <div class="field">
    <label for="pname">Nom du point</label>
    <input type="text" id="pname" placeholder="Ex: Point Akwa 2">
  </div>

  <div>
    <span class="section-label">Qui opère ce point ?</span>
    <div class="choice-row">
      <div class="choice-card" data-choice="self" id="choiceSelf"><div class="ic">&#128075;</div><div class="lbl">Moi-même</div></div>
      <div class="choice-card selected" data-choice="supervisor" id="choiceSup"><div class="ic">&#128100;</div><div class="lbl">Assigner un superviseur</div></div>
    </div>
  </div>

  <div class="supervisor-search visible" id="supervisorSearch">
    <div class="field"><label for="supSearch">Rechercher un superviseur existant</label><input type="text" id="supSearch" placeholder="Nom ou téléphone"></div>
    <div class="search-results" id="searchResults"></div>
    <div class="invite-note">Personne ne correspond ? <a href="11-equipe.html">Inviter un nouveau superviseur</a></div>
  </div>

  <div class="card">
    <h4>État actuel du point (reprise d'activité)</h4>
    <div class="hint-box">Il ne s'agit pas de repartir à zéro — indiquez simplement ce que le point possède aujourd'hui.</div>
    <div class="field"><label for="cashInit">Cash en caisse aujourd'hui</label><input type="text" id="cashInit" placeholder="0 FCFA" inputmode="numeric"></div>
    <div class="field"><label for="omInit">Solde électronique Orange Money</label><input type="text" id="omInit" placeholder="0 FCFA" inputmode="numeric"></div>
    <div class="field"><label for="momoInit">Solde électronique MTN MoMo</label><input type="text" id="momoInit" placeholder="0 FCFA" inputmode="numeric"></div>
  </div>

  <button class="btn primary" id="activateBtn">Activer ce point</button>
</div>

<script>
  const choiceSelf = document.getElementById('choiceSelf');
  const choiceSup = document.getElementById('choiceSup');
  const supervisorSearch = document.getElementById('supervisorSearch');
  const searchResults = document.getElementById('searchResults');
  const supSearch = document.getElementById('supSearch');

  const supervisors = [
    { name:'Brice R.', tag:'Supervise déjà 1 point' },
    { name:'Sarah N.', tag:'Supervise déjà 1 point' },
    { name:'Paul K.', tag:'Disponible' },
  ];

  let selectedSup = null;

  function renderResults(query) {
    const q = query.trim().toLowerCase();
    const matches = q === '' ? supervisors : supervisors.filter(s => s.name.toLowerCase().includes(q));
    if (matches.length === 0) {
      searchResults.innerHTML = '<div class="invite-note">Aucun résultat</div>';
      return;
    }
    searchResults.innerHTML = matches.map(s => `
      <div class="search-item" data-name="${s.name}">
        <div><div class="si-name">${s.name}</div><div class="si-tag">${s.tag}</div></div>
      </div>
    `).join('');
    searchResults.querySelectorAll('.search-item').forEach(item => {
      item.addEventListener('click', () => {
        searchResults.querySelectorAll('.search-item').forEach(i => i.classList.remove('selected'));
        item.classList.add('selected');
        selectedSup = item.dataset.name;
      });
    });
  }
  renderResults('');
  supSearch.addEventListener('input', () => renderResults(supSearch.value));

  choiceSelf.addEventListener('click', () => {
    choiceSelf.classList.add('selected'); choiceSup.classList.remove('selected');
    supervisorSearch.classList.remove('visible');
  });
  choiceSup.addEventListener('click', () => {
    choiceSup.classList.add('selected'); choiceSelf.classList.remove('selected');
    supervisorSearch.classList.add('visible');
  });

  document.getElementById('activateBtn').addEventListener('click', () => {
    window.location.href = '09-dashboard-owner-multi.html';
  });
</script>

</body>
</html>
